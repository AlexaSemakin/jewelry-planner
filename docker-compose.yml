services:
  db:
    image: postgres:16-alpine
    container_name: jewelry_planner_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jewelry}
      POSTGRES_USER: ${POSTGRES_USER:-jewelry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jewelry}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jewelry} -d ${POSTGRES_DB:-jewelry}"]
      interval: 5s
      timeout: 3s
      retries: 20

  bot:
    build:
      context: ./bot
    container_name: jewelry_planner_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
