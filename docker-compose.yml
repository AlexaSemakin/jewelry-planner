services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jewelry
      POSTGRES_PASSWORD: jewelry
      POSTGRES_DB: jewelry
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jewelry -d jewelry"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://jewelry:jewelry@db:5432/jewelry
      SEED_ON_START: "true"
      COURIERS_TOTAL: "3"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
